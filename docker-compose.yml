# version: '3.5'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  elasticsearch:
    container_name: es01
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - ./volumes/es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    container_name: retrieval-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

  backend-api:
    container_name: retrieval-backend-api
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - api
    environment:
      MILVUS_HOST: standalone
      ELASTIC_HOST: elasticsearch
      REDIS_URL: redis://redis:6379/0
      VISUAL_MODEL_PROVIDER: siglip2
      VISUAL_MODEL: google/siglip2-so400m-patch16-naflex
      VECTOR_DIMENSION: 1152
      VISUAL_TRUNCATE_DIM: 1152
      MODEL_TRUST_REMOTE_CODE: "true"
      TEXT_COLLECTION_NAME: video_text_embeddings
      ENABLE_DENSE_TEXT_RETRIEVAL: "true"
      TEXT_MODEL_PROVIDER: sentence_transformers
      TEXT_MODEL: BAAI/bge-m3
      TEXT_VECTOR_DIMENSION: 1024
      ENABLE_QUERY_TRANSLATION: "true"
      QUERY_TRANSLATION_PROVIDER: nllb
      QUERY_TRANSLATION_MODEL: facebook/nllb-200-distilled-600M
      QUERY_TRANSLATION_SRC_LANG: vie_Latn
      QUERY_TRANSLATION_TGT_LANG: eng_Latn
      ASR_MODEL: large-v3
      ASR_LANGUAGE: vi
      OCR_ENGINE: paddleocr
      OCR_LANGUAGES: en,vi
      RERANK_MODEL_PROVIDER: sentence_transformers
      RERANK_MODEL: BAAI/bge-reranker-v2-m3
    volumes:
      - ./data:/app/data
    ports:
      - "5000:5000"
    depends_on:
      - standalone
      - elasticsearch
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  default:
    name: milvus-es-net
